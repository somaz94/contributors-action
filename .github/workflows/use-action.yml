name: Smoke Test (Released Action)

on:
  workflow_dispatch:
    inputs:
      run:
        description: 'workflow run'
        required: true
        default: 'true'
  workflow_run:
    workflows: ["Create release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  smoke-test-dry-run:
    name: Smoke Test (Dry Run)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (dry-run)
        id: contributors-dry-run
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS.md
          dry_run: true

      - name: Verify Dry Run Output
        run: |
          echo "contributors_count=${{ steps.contributors-dry-run.outputs.contributors_count }}"
          echo "output_file=${{ steps.contributors-dry-run.outputs.output_file }}"
          echo "top_contributor=${{ steps.contributors-dry-run.outputs.top_contributor }}"
          if [ -z "${{ steps.contributors-dry-run.outputs.contributors_count }}" ]; then
            echo "FAIL: contributors_count is empty"
            exit 1
          fi
          echo "PASS: dry-run completed successfully"

  smoke-test-table-format:
    name: Smoke Test (Table Format)
    runs-on: ubuntu-latest
    needs: [smoke-test-dry-run]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (table)
        id: contributors-table
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-TABLE.md
          format: table
          columns: 6

      - name: Verify Table Output
        run: |
          if [ ! -f "CONTRIBUTORS-TABLE.md" ]; then
            echo "FAIL: CONTRIBUTORS-TABLE.md not found"
            exit 1
          fi
          if ! grep -q "<table>" CONTRIBUTORS-TABLE.md; then
            echo "FAIL: table tag not found"
            exit 1
          fi
          echo "PASS: table format verified"
          head -20 CONTRIBUTORS-TABLE.md

  smoke-test-list-format:
    name: Smoke Test (List Format)
    runs-on: ubuntu-latest
    needs: [smoke-test-dry-run]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (list)
        id: contributors-list
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-LIST.md
          format: list
          avatar_size: 50

      - name: Verify List Output
        run: |
          if [ ! -f "CONTRIBUTORS-LIST.md" ]; then
            echo "FAIL: CONTRIBUTORS-LIST.md not found"
            exit 1
          fi
          if ! grep -q "contributions)" CONTRIBUTORS-LIST.md; then
            echo "FAIL: contribution count not found"
            exit 1
          fi
          echo "PASS: list format verified"
          cat CONTRIBUTORS-LIST.md

  smoke-test-image-format:
    name: Smoke Test (Image Format)
    runs-on: ubuntu-latest
    needs: [smoke-test-dry-run]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (image)
        id: contributors-image
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-IMAGE.md
          format: image
          avatar_size: 80

      - name: Verify Image Output
        run: |
          if [ ! -f "CONTRIBUTORS-IMAGE.md" ]; then
            echo "FAIL: CONTRIBUTORS-IMAGE.md not found"
            exit 1
          fi
          if ! grep -q 'title=' CONTRIBUTORS-IMAGE.md; then
            echo "FAIL: title attribute not found"
            exit 1
          fi
          echo "PASS: image format verified"
          cat CONTRIBUTORS-IMAGE.md

  smoke-test-exclude-and-sort:
    name: Smoke Test (Exclude and Sort)
    runs-on: ubuntu-latest
    needs: [smoke-test-table-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate with Exclude and Sort by Name
        id: contributors-filtered
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-FILTERED.md
          format: list
          exclude: 'dependabot[bot],renovate[bot]'
          sort_by: name
          max_contributors: 5

      - name: Verify Filtered Output
        run: |
          if [ ! -f "CONTRIBUTORS-FILTERED.md" ]; then
            echo "FAIL: CONTRIBUTORS-FILTERED.md not found"
            exit 1
          fi
          if grep -qi "dependabot" CONTRIBUTORS-FILTERED.md; then
            echo "FAIL: dependabot should be excluded"
            exit 1
          fi
          echo "PASS: exclude and sort verified"
          cat CONTRIBUTORS-FILTERED.md

  smoke-test-section-update:
    name: Smoke Test (Section Update)
    runs-on: ubuntu-latest
    needs: [smoke-test-table-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create test file with markers
        run: |
          cat > TEST-README.md <<'EOF'
          # My Project

          ## Contributors

          <!-- CONTRIBUTORS-START -->
          <!-- CONTRIBUTORS-END -->

          ## License
          MIT
          EOF

      - name: Update Section in Existing File
        id: contributors-section
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: TEST-README.md
          format: table
          columns: 4
          update_section: true
          section_start: '<!-- CONTRIBUTORS-START -->'
          section_end: '<!-- CONTRIBUTORS-END -->'

      - name: Verify Section Update
        run: |
          if ! grep -q "<!-- CONTRIBUTORS-START -->" TEST-README.md; then
            echo "FAIL: start marker missing"
            exit 1
          fi
          if ! grep -q "<!-- CONTRIBUTORS-END -->" TEST-README.md; then
            echo "FAIL: end marker missing"
            exit 1
          fi
          if ! grep -q "## License" TEST-README.md; then
            echo "FAIL: content after markers was lost"
            exit 1
          fi
          if ! grep -q "<table>" TEST-README.md; then
            echo "FAIL: contributors table not inserted"
            exit 1
          fi
          echo "PASS: section update verified"
          cat TEST-README.md

  smoke-test-cross-repo:
    name: Smoke Test (Cross Repository)
    runs-on: ubuntu-latest
    needs: [smoke-test-list-format, smoke-test-image-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch Contributors from Different Repo
        id: contributors-cross
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: somaz94
          repo: go-changelog-action
          output_file: CONTRIBUTORS-CROSS.md
          format: table
          columns: 6

      - name: Verify Cross Repo Output
        run: |
          echo "contributors_count=${{ steps.contributors-cross.outputs.contributors_count }}"
          echo "top_contributor=${{ steps.contributors-cross.outputs.top_contributor }}"
          if [ ! -f "CONTRIBUTORS-CROSS.md" ]; then
            echo "FAIL: CONTRIBUTORS-CROSS.md not found"
            exit 1
          fi
          if [ -z "${{ steps.contributors-cross.outputs.contributors_count }}" ]; then
            echo "FAIL: contributors_count is empty"
            exit 1
          fi
          echo "PASS: cross-repo fetch verified"
          head -20 CONTRIBUTORS-CROSS.md

  smoke-test-custom-options:
    name: Smoke Test (Custom Options)
    runs-on: ubuntu-latest
    needs: [smoke-test-exclude-and-sort, smoke-test-section-update]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate with All Custom Options
        id: contributors-custom
        uses: somaz94/contributors-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-CUSTOM.md
          format: table
          columns: 3
          max_contributors: 10
          exclude: 'dependabot[bot]'
          include_bots: false
          avatar_size: 60
          sort_by: contributions

      - name: Verify Custom Output
        run: |
          if [ ! -f "CONTRIBUTORS-CUSTOM.md" ]; then
            echo "FAIL: CONTRIBUTORS-CUSTOM.md not found"
            exit 1
          fi
          if ! grep -q 'width="60"' CONTRIBUTORS-CUSTOM.md; then
            echo "FAIL: avatar size 60 not applied"
            exit 1
          fi
          echo "PASS: custom options verified"
          cat CONTRIBUTORS-CUSTOM.md
