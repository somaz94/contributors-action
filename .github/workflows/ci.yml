name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run Go tests with coverage
        run: go test ./... -v -cover -coverprofile=coverage.out

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "FAIL: Coverage ${COVERAGE}% is below 80%"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets threshold"

  build-and-push-docker:
    name: Build and Push Docker
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    env:
      TEST_TAG: localhost:5001/actions/contributors-action:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Run the Container (dry-run)
        run: |
          docker run \
            --env INPUT_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            --env INPUT_OWNER="somaz94" \
            --env INPUT_REPO="contributors-action" \
            --env INPUT_OUTPUT_FILE="CONTRIBUTORS.md" \
            --env INPUT_DRY_RUN="true" \
            --rm ${{ env.TEST_TAG }}

  test-action-dry-run:
    name: Test Dry Run
    runs-on: ubuntu-latest
    needs: build-and-push-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Local Action (dry-run)
        id: test-action
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS.md
          dry_run: true

      - name: Verify Output
        run: |
          cat <<'EOF'
          contributors_count=${{ steps.test-action.outputs.contributors_count }}
          output_file=${{ steps.test-action.outputs.output_file }}
          top_contributor=${{ steps.test-action.outputs.top_contributor }}
          EOF
          if [ -z "${{ steps.test-action.outputs.contributors_count }}" ]; then
            echo "FAIL: contributors_count output is empty"
            exit 1
          fi
          echo "PASS: action outputs verified"

  test-action-table-format:
    name: Test Table Format
    runs-on: ubuntu-latest
    needs: build-and-push-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (table)
        id: table-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-TABLE.md
          format: table
          columns: 4

      - name: Verify Table Output
        run: |
          if [ ! -f "CONTRIBUTORS-TABLE.md" ]; then
            echo "FAIL: CONTRIBUTORS-TABLE.md not found"
            exit 1
          fi
          if ! grep -q "<table>" CONTRIBUTORS-TABLE.md; then
            echo "FAIL: table tag not found"
            exit 1
          fi
          echo "PASS: table format verified"
          head -20 CONTRIBUTORS-TABLE.md

  test-action-list-format:
    name: Test List Format
    runs-on: ubuntu-latest
    needs: build-and-push-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (list)
        id: list-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-LIST.md
          format: list
          avatar_size: 50

      - name: Verify List Output
        run: |
          if [ ! -f "CONTRIBUTORS-LIST.md" ]; then
            echo "FAIL: CONTRIBUTORS-LIST.md not found"
            exit 1
          fi
          if ! grep -q "contributions)" CONTRIBUTORS-LIST.md; then
            echo "FAIL: contribution count not found in list"
            exit 1
          fi
          if ! grep -q 'width="50"' CONTRIBUTORS-LIST.md; then
            echo "FAIL: avatar size 50 not applied"
            exit 1
          fi
          echo "PASS: list format verified"
          cat CONTRIBUTORS-LIST.md

  test-action-image-format:
    name: Test Image Format
    runs-on: ubuntu-latest
    needs: build-and-push-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Contributors (image)
        id: image-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-IMAGE.md
          format: image
          avatar_size: 80

      - name: Verify Image Output
        run: |
          if [ ! -f "CONTRIBUTORS-IMAGE.md" ]; then
            echo "FAIL: CONTRIBUTORS-IMAGE.md not found"
            exit 1
          fi
          if ! grep -q 'title=' CONTRIBUTORS-IMAGE.md; then
            echo "FAIL: title attribute not found in image format"
            exit 1
          fi
          echo "PASS: image format verified"
          cat CONTRIBUTORS-IMAGE.md

  test-action-exclude-and-sort:
    name: Test Exclude and Sort
    runs-on: ubuntu-latest
    needs: [test-action-table-format]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate with Exclude and Sort by Name
        id: exclude-sort-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: CONTRIBUTORS-FILTERED.md
          format: list
          exclude: 'dependabot[bot],renovate[bot]'
          sort_by: name
          max_contributors: 5

      - name: Verify Exclude Output
        run: |
          if [ ! -f "CONTRIBUTORS-FILTERED.md" ]; then
            echo "FAIL: CONTRIBUTORS-FILTERED.md not found"
            exit 1
          fi
          if grep -qi "dependabot" CONTRIBUTORS-FILTERED.md; then
            echo "FAIL: dependabot should be excluded"
            exit 1
          fi
          LINE_COUNT=$(wc -l < CONTRIBUTORS-FILTERED.md | tr -d ' ')
          if [ "$LINE_COUNT" -gt 5 ]; then
            echo "FAIL: max_contributors=5 but got $LINE_COUNT lines"
            exit 1
          fi
          echo "PASS: exclude and sort verified"
          cat CONTRIBUTORS-FILTERED.md

  test-action-section-update:
    name: Test Section Update
    runs-on: ubuntu-latest
    needs: [test-action-table-format]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create test file with markers
        run: |
          cat > TEST-README.md <<'EOF'
          # My Project

          ## Contributors

          <!-- CONTRIBUTORS-START -->
          <!-- CONTRIBUTORS-END -->

          ## License
          MIT
          EOF

      - name: Update Section in Existing File
        id: section-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_file: TEST-README.md
          format: table
          columns: 4
          update_section: true
          section_start: '<!-- CONTRIBUTORS-START -->'
          section_end: '<!-- CONTRIBUTORS-END -->'

      - name: Verify Section Update
        run: |
          if ! grep -q "<!-- CONTRIBUTORS-START -->" TEST-README.md; then
            echo "FAIL: start marker missing"
            exit 1
          fi
          if ! grep -q "<!-- CONTRIBUTORS-END -->" TEST-README.md; then
            echo "FAIL: end marker missing"
            exit 1
          fi
          if ! grep -q "## License" TEST-README.md; then
            echo "FAIL: content after markers was lost"
            exit 1
          fi
          if ! grep -q "<table>" TEST-README.md; then
            echo "FAIL: contributors table not inserted"
            exit 1
          fi
          echo "PASS: section update verified"
          cat TEST-README.md

  test-action-cross-repo:
    name: Test Cross Repository
    runs-on: ubuntu-latest
    needs: [test-action-list-format, test-action-image-format]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch Contributors from Different Repo
        id: cross-repo-test
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: somaz94
          repo: go-changelog-action
          output_file: CONTRIBUTORS-CROSS.md
          format: table
          columns: 6
          dry_run: true

      - name: Verify Cross Repo Output
        run: |
          echo "contributors_count=${{ steps.cross-repo-test.outputs.contributors_count }}"
          echo "top_contributor=${{ steps.cross-repo-test.outputs.top_contributor }}"
          if [ -z "${{ steps.cross-repo-test.outputs.contributors_count }}" ]; then
            echo "FAIL: contributors_count is empty"
            exit 1
          fi
          echo "PASS: cross-repo fetch verified"

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-tests
      - build-and-push-docker
      - test-action-dry-run
      - test-action-table-format
      - test-action-list-format
      - test-action-image-format
      - test-action-exclude-and-sort
      - test-action-section-update
      - test-action-cross-repo
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
